<!DOCTYPE HTML>
<html>
<head>
	<title>CNC Feedrate Calculator</title>
	<meta charset="utf-8" />
  	<meta name="viewport" content="width=device-width, initial-scale=1">
  	<script src="https://code.jquery.com/jquery-1.11.1.min.js"></script> 
  	<!--<script src="https://code.jquery.com/mobile/1.4.5/jquery.mobile-1.4.5.min.js"></script> -->
    <script src="millrightcnccalc.js"></script> 
</head>

<body style="text-align:center;">
		
<div>
	<div style="
			border-radius: .375rem;
			color:oklch(48.8% .243 264.376);
			background-color: oklch(97% .014 254.604);
			padding: 1rem;
			display: inline-block;
			font-family: -apple-system, BlinkMacSystemFont, avenir next, avenir, segoe ui, helvetica neue, Adwaita Sans, Cantarell, Ubuntu, roboto, noto, helvetica, arial, sans-serif;
			font-weight: normal;
			font-size: 1.1rem;">
		ℹ️ Try the updated calculator
		<a href="https://northendmakerspace.github.io/cnc-feedrate-calculator/">here</a>.
	</div>

	<div>
		
		<h2>CNC Feedrate Calculator</h2>
		
		<h4>Cutter Size:</h4>
		<div>

			<input type="radio" name="Cutter" id="CutterA" value="0">
			<label for="CutterA">1/16"</label>
			<input type="radio" name="Cutter" id="CutterB" value="1">
			<label for="CutterB">1/8"</label>
			<input type="radio" name="Cutter" id="CutterC" value="2">
			<label for="CutterC">3/16"</label>
			<input type="radio" name="Cutter" id="CutterD" value="3" checked="checked">
			<label for="CutterD">1/4"</label>
		</div>	
		<div>
			<input type="radio" name="Cutter" id="CutterE" value="0">
			<label for="CutterE">2mm</label>
			<input type="radio" name="Cutter" id="CutterF" value="1">
			<label for="CutterF">3mm</label>
			<input type="radio" name="Cutter" id="CutterG" value="2">
			<label for="CutterG">5mm</label>
			<input type="radio" name="Cutter" id="CutterH" value="3">
			<label for="CutterH">6mm</label>
		</div>

		<h4>Number of Flutes:</h4>       
		<div>
			<input type="radio" name="Flutes" id="FlutesA" value="1">
			<label for="FlutesA">1</label>
			<input type="radio" name="Flutes" id="FlutesB" value="2" checked="checked">
			<label for="FlutesB">2</label>
			<input type="radio" name="Flutes" id="FlutesC" value="3">
			<label for="FlutesC">3</label>
			<input type="radio" name="Flutes" id="FlutesD" value="4">
			<label for="FlutesD">4</label>
		</div>
		
		<h4>Aggression:</h4>
		<div>
			<input type="radio" name="Aggression" id="AggressionA" value="Slow" checked="checked">
			<label for="AggressionA">Conservative</label>
			<input type="radio" name="Aggression" id="AggressionB" value="Medium">
			<label for="AggressionB">Normal</label>
			<input type="radio" name="Aggression" id="AggressionC" value="Fast">
			<label for="AggressionC">Aggressive</label>
		</div>

		<h4>RPM:</h4>
		<div>
			<input type="number" name="Speed" id="Speed" data-highlight="true" min="8000" max="32000" step ="10" value="16000">
		</div>

		<h4>Material:</h4>
		<div>
			<select id="Material">
				<option value="Aluminum">Aluminum (6061)</option>
				<option value="Hard_Plastic">Hard Plastic (i.e. acrylic, pvc)</option>
				<option value="Hardwood">Hardwood (i.e. maple, oak, walnut)</option>
				<option value="MDF">MDF</option>
				<option value="Soft_Plastic">Soft Plastic (i.e. abs, styrofoam)</option>
				<option value="Softwood">Softwood (i.e. pine, cedar, fir)</option>
			</select>
		</div>
		
		<h4>Units:</h4>       
		<div>
			<input type="radio" name="Units" id="UnitsA" value="0" checked="checked">
			<label for="UnitsA">Inches</label>
			<input type="radio" name="Units" id="UnitsB" value="1">
			<label for="UnitsB">Millimeters</label>
		</div>

	
	    <br><br><input type="button" onclick="calculate()" value="Calculate">
		
	    <div>
			<div>
				<h4>Feedrate:</h4>
				<textarea rows="1" cols="30" id="feedRateInchesArea" name="fritextarea"></textarea>
			</div>
			<div>
				<h4>Depth of Cut:</h4>
				<textarea rows="1" cols="30" id="depthOfCutArea" name="doctextarea"></textarea>
			</div>
			<div>
				<h4>Chip Load:</h4>
				<textarea rows="1" cols="30" id="chipLoadArea" name="cltextarea"></textarea>
			</div>
		</div>	
	</div>
</div>

</body>
</html>
